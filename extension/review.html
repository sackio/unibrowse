<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Review Recording</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      color: #333;
      background: #f5f5f5;
    }

    /* Sticky header */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: #1a1a2e;
      color: white;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    .header h1 {
      font-size: 18px;
      font-weight: 600;
    }

    .header-actions {
      display: flex;
      gap: 10px;
    }

    .btn {
      padding: 8px 18px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-discard {
      background: #444;
      color: #ccc;
    }

    .btn-discard:hover {
      background: #555;
      color: white;
    }

    .btn-save {
      background: #28a745;
      color: white;
    }

    .btn-save:hover:not(:disabled) {
      background: #218838;
    }

    .btn-save:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-saved {
      background: #17a2b8;
      color: white;
    }

    /* Main content */
    .content {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
    }

    /* Cards */
    .card {
      background: white;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .card h2 {
      font-size: 15px;
      font-weight: 600;
      color: #1a1a2e;
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid #eee;
    }

    /* Form fields */
    .field {
      margin-bottom: 14px;
    }

    .field label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 5px;
    }

    .field input, .field textarea {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-size: 14px;
      font-family: inherit;
      transition: border-color 0.2s;
    }

    .field input:focus, .field textarea:focus {
      outline: none;
      border-color: #007bff;
    }

    .field input.error {
      border-color: #dc3545;
    }

    .field textarea {
      resize: vertical;
      min-height: 70px;
    }

    .stats-row {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .stat {
      display: flex;
      flex-direction: column;
    }

    .stat-label {
      font-size: 11px;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .stat-value {
      font-size: 14px;
      font-weight: 600;
      color: #333;
    }

    /* Steps section */
    .steps-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .steps-header h2 {
      font-size: 15px;
      font-weight: 600;
      color: #1a1a2e;
      border: none;
      margin: 0;
      padding: 0;
    }

    .step-count-badge {
      background: #e9ecef;
      color: #666;
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
    }

    /* Step cards */
    .step-card {
      background: white;
      border: 1px solid #e9ecef;
      border-radius: 6px;
      margin-bottom: 6px;
      overflow: hidden;
    }

    .step-card.deleted {
      display: none;
    }

    .step-summary {
      display: flex;
      align-items: center;
      padding: 10px 14px;
      cursor: pointer;
      user-select: none;
      gap: 10px;
    }

    .step-summary:hover {
      background: #f8f9fa;
    }

    .step-num {
      font-size: 11px;
      font-weight: 700;
      color: #999;
      min-width: 28px;
    }

    .step-type-badge {
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      min-width: 58px;
      text-align: center;
    }

    .type-click { background: #cfe2ff; color: #0d6efd; }
    .type-input { background: #d1e7dd; color: #198754; }
    .type-keydown { background: #e2d9f3; color: #6f42c1; }
    .type-scroll { background: #e9ecef; color: #6c757d; }
    .type-focus, .type-blur { background: #fff3cd; color: #856404; }
    .type-drag, .type-drop { background: #d2f4ea; color: #0f5132; }
    .type-other { background: #f8d7da; color: #842029; }

    .step-desc {
      flex: 1;
      font-size: 13px;
      color: #333;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .step-time {
      font-size: 11px;
      color: #aaa;
      min-width: 45px;
      text-align: right;
    }

    .step-delete {
      background: none;
      border: none;
      color: #aaa;
      cursor: pointer;
      font-size: 16px;
      padding: 0 4px;
      line-height: 1;
      transition: color 0.15s;
    }

    .step-delete:hover {
      color: #dc3545;
    }

    .step-details {
      display: none;
      padding: 12px 14px;
      background: #f8f9fa;
      border-top: 1px solid #e9ecef;
    }

    .step-card.expanded .step-details {
      display: block;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: 110px 1fr;
      gap: 4px 10px;
      font-size: 12px;
      margin-bottom: 10px;
    }

    .detail-key {
      color: #888;
      font-weight: 500;
    }

    .detail-val {
      color: #333;
      word-break: break-all;
    }

    .note-field {
      width: 100%;
      padding: 6px 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 13px;
      font-family: inherit;
      resize: vertical;
      min-height: 52px;
    }

    .note-field:focus {
      outline: none;
      border-color: #007bff;
    }

    .note-label {
      font-size: 11px;
      color: #888;
      margin-bottom: 4px;
    }

    /* Empty state */
    .empty-steps {
      text-align: center;
      padding: 40px 20px;
      color: #999;
    }

    .empty-steps p { margin-bottom: 6px; }
    .empty-steps small { font-size: 12px; }

    /* Loading */
    .loading {
      text-align: center;
      padding: 60px 20px;
      color: #999;
    }

    /* Video replay card */
    .video-card { padding: 0; overflow: hidden; }

    .video-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: #1a1a2e;
      color: white;
      font-size: 14px;
      font-weight: 600;
    }

    .btn-video-toggle {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      color: white;
      padding: 4px 10px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 12px;
    }
    .btn-video-toggle:hover { background: rgba(255,255,255,0.22); }

    #recording-video {
      width: 100%;
      display: block;
      max-height: 420px;
      background: #000;
    }

    .video-loading {
      text-align: center;
      padding: 24px;
      color: #999;
      font-size: 13px;
    }

    .video-body { display: block; }

    /* Selector Capture Step Cards */
    .type-selector-capture { background: #ccfbf1; color: #0f766e; }
    .step-card--capture .step-summary { border-left: 3px solid #0d9488; }
    .step-details--capture { background: #f0fdfa; border-top: 1px solid #99f6e4; }

    .capture-edit-row { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
    .capture-edit-label { font-size:11px; font-weight:600; color:#0f766e;
      text-transform:uppercase; letter-spacing:0.4px; min-width:60px; }
    .capture-edit-row input { flex:1; padding:5px 9px; border:1px solid #99f6e4;
      border-radius:4px; font-size:13px; font-family:inherit; background:white; }
    .capture-edit-row input:focus { outline:none; border-color:#0d9488; }

    .capture-stats { display:flex; gap:14px; flex-wrap:wrap; font-size:11px;
      color:#0f766e; margin-bottom:8px; padding:4px 0;
      border-top:1px solid #ccfbf1; border-bottom:1px solid #ccfbf1; }

    .capture-options-toggle { font-size:12px; color:#0d9488; cursor:pointer;
      padding:4px 0; user-select:none; font-weight:500; }
    .capture-options-toggle:hover { text-decoration:underline; }

    .capture-options-list { margin-bottom:8px; border:1px solid #99f6e4;
      border-radius:4px; overflow:hidden; }
    .capture-options-list.hidden { display:none; }

    .capture-option-row { display:flex; align-items:center; gap:8px; padding:5px 8px;
      font-size:12px; cursor:pointer; border-bottom:1px solid #e6fffa; }
    .capture-option-row:last-child { border-bottom:none; }
    .capture-option-row:hover { background:#e6fffa; }

    .capture-opt-strategy { min-width:72px; font-weight:600; font-size:10px;
      color:#0f766e; text-transform:uppercase; letter-spacing:0.3px; }
    .capture-opt-selector { flex:1; font-family:monospace; font-size:11px;
      color:#1e293b; word-break:break-all; }
    .capture-opt-count { font-size:10px; color:#64748b; white-space:nowrap; }

    .capture-el-tag { display:inline-block; background:#f1f5f9; color:#0f766e;
      padding:1px 5px; border-radius:3px; font-family:monospace;
      font-size:10px; font-weight:600; }
    .capture-el-text { color:#64748b; font-style:italic; }
    .capture-elements-preview { font-size:11px; color:#475569; margin:6px 0; line-height:1.8; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Review Recording</h1>
    <div class="header-actions">
      <button class="btn btn-discard" id="discard-btn">Discard</button>
      <button class="btn btn-save" id="save-btn">Save Recording</button>
    </div>
  </div>

  <div id="video-container" class="card video-card" style="display:none;">
    <div class="video-header">
      <span>🎬 Recording Replay</span>
      <button class="btn-video-toggle" id="video-toggle">▾ Hide</button>
    </div>
    <div class="video-body" id="video-body">
      <div class="video-loading" id="video-loading">Loading replay…</div>
      <video id="recording-video" controls playsinline style="display:none;"></video>
    </div>
  </div>

  <div class="content" id="content">
    <div class="loading">Loading recording…</div>
  </div>

  <script src="review.js"></script>
</body>
</html>
